events {}

http {

    log_format custom '$remote_addr - $request_method $request_uri -> $upstream_addr [$status]';
    access_log /var/log/nginx/access.log custom;

    server {
        listen 80;

        # =========================
        # REMOVE BACKEND CORS HEADERS
        # =========================
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;

        # =========================
        # GLOBAL CORS (ONLY SOURCE OF TRUTH)
        # =========================
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        # =========================
        # GLOBAL PREFLIGHT HANDLER
        # =========================
        if ($request_method = OPTIONS) {
            return 204;
        }

        # =========================================================
        # FASTAPI
        # =========================================================
        location /api/employees {
            proxy_pass http://fastapi:8002/employees;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # =========================================================
        # EXPRESS
        # =========================================================
        location /api/express/employees {
            proxy_pass http://express:3001/employees;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # =========================================================
        # SPRING BOOT (already working, left clean)
        # =========================================================
        location /api/spring/employees {
            proxy_pass http://springboot:8003/employees;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # =========================================================
        # DOTNET
        # =========================================================
        location /api/dotnet/employees {
            proxy_pass http://dotnet:8080/employees;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # =========================
        # ROOT TEST
        # =========================
        location / {
            return 200 "API Gateway Running 🚀";
        }
    }
}
