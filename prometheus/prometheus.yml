global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'capstone-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'ec2-instance'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://nginx:80/api/express/employees
        labels:
          framework: 'express'
      - targets:
          - http://nginx:80/api/employees
        labels:
          framework: 'fastapi'
      - targets:
          - http://nginx:80/api/spring/employees
        labels:
          framework: 'spring'
      - targets:
          - http://nginx:80/api/dotnet/employees
        labels:
          framework: 'dotnet'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox-exporter:9115
