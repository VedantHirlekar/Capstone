global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Scrape Prometheus itself for metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          environment: 'production'
          service: 'prometheus'

  # Scrape NGINX gateway metrics through the exporter
  - job_name: 'nginx-gateway'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          application: 'api-gateway'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
