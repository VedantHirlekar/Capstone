global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Rule files for alerts
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (host metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor (container metrics)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Express.js application
  - job_name: 'express-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['express:3001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'express-app'

  # FastAPI application
  - job_name: 'fastapi-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['fastapi:8002']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'fastapi-app'

  # Spring Boot application
  - job_name: 'springboot-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['springboot:8003']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'springboot-app'

  # .NET application
  - job_name: 'dotnet-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['dotnet:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'dotnet-app'

  # Blackbox monitoring for health endpoints
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://express:3001/health
        - http://fastapi:8002/health
        - http://springboot:8003/actuator/health
        - http://dotnet:8080/health
        - http://api-gateway:80/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
