groups:
  - name: service_health
    rules:
      # Service down alert
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute"
          action: "Check service logs and container status"

      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High CPU usage on host"
          description: "CPU usage is above 80% for 5 minutes"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High memory usage on host"
          description: "Memory usage is above 90% for 5 minutes"

      # Container down
      - alert: ContainerDown
        expr: count without (cpu, endpt, id, image, io, mount, name, perf) (container_last_seen{container_label_com_docker_compose_service!=""}) == 0
        for: 1m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Container {{ $labels.container_label_com_docker_compose_service }} is down"
          description: "Container has stopped running"

      # API response time high
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High API response time for {{ $labels.instance }}"
          description: "95th percentile response time is above 2 seconds"

      # Failed health checks
      - alert: HealthCheckFailed
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "Health check failed for {{ $labels.instance }}"
          description: "Health endpoint is not responding correctly"
