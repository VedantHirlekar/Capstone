services:

  express:
    build: ./express_app
    container_name: express-app
    ports:
      - "3001:3001"
    networks:
      - capstone-net
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      PORT: 3001

  fastapi:
    build: ./fastapi_app
    container_name: fastapi-app
    ports:
      - "8002:8002"
    networks:
      - capstone-net
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}

  springboot:
    build: ./springboot_app
    container_name: springboot-app
    ports:
      - "8003:8003"
    networks:
      - capstone-net
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}

  dotnet:
    build: ./dotnet_app
    container_name: dotnet-app
    ports:
      - "8004:8080"
    networks:
      - capstone-net
    environment:
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}

  nginx:
    build: ./nginx
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - express
      - fastapi
      - springboot
      - dotnet
    networks:
      - capstone-net

networks:
  capstone-net:
