version: "3.8"

services:

  express:
    image: 767398016991.dkr.ecr.eu-north-1.amazonaws.com/express-app:${IMAGE_TAG}
    container_name: express-app
    ports:
      - "3001:3001"

  fastapi:
    image: 767398016991.dkr.ecr.eu-north-1.amazonaws.com/fastapi-app:${IMAGE_TAG}
    container_name: fastapi-app
    ports:
      - "8002:8002"

  springboot:
    image: 767398016991.dkr.ecr.eu-north-1.amazonaws.com/springboot-app:${IMAGE_TAG}
    container_name: springboot-app
    ports:
      - "8003:8003"

  dotnet:
    image: 767398016991.dkr.ecr.eu-north-1.amazonaws.com/dotnet-app:${IMAGE_TAG}
    container_name: dotnet-app
    ports:
      - "8004:8080"

  nginx:
    image: 767398016991.dkr.ecr.eu-north-1.amazonaws.com/nginx-gateway:${IMAGE_TAG}
    container_name: api-gateway
    ports:
      - "8080:80"
